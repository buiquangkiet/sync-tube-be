spring:
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:synctube}?useSSL=true&allowPublicKeyRetrieval=true}
    username: ${DATABASE_USERNAME:${MYSQLUSER:root}}
    password: ${DATABASE_PASSWORD:${MYSQLPASSWORD:}}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false

server:
  port: ${PORT:8081}

app:
  jwt:
    secret: ${JWT_SECRET}
  frontend:
    url: ${FRONTEND_URL}
  cors:
    allowed-origin-patterns: "${app.frontend.url},http://localhost:*,https://*.vercel.app"
