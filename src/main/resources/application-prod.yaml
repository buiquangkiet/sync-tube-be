spring:
  datasource:
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
    hikari:
      connection-timeout: 60000
      initialization-fail-timeout: 120000
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

server:
  port: ${PORT:8081}

app:
  jwt:
    secret: ${JWT_SECRET}
  frontend:
    url: ${FRONTEND_URL}
  cors:
    allowed-origin-patterns: "${app.frontend.url},http://localhost:*,https://*.vercel.app"
