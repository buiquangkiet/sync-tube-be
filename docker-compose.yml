services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: synctube
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: .
    restart: unless-stopped
    ports:
      - "${BE_PORT:-8081}:8081"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-oauth,prod}
      MYSQLHOST: mysql
      MYSQLPORT: 3306
      MYSQLUSER: root
      MYSQLPASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQLDATABASE: synctube
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -S -O /dev/null http://localhost:8081/api/rooms/code/HEALTHCHECK 2>&1 | grep -q 'HTTP/'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

volumes:
  mysql_data:
